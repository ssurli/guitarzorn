<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zorn Pentatonic - p5.brush Professional Oil Painting</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <!-- p5.brush library (local copy) -->
  <script src="p5.brush.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Monaco', 'Courier New', monospace;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    h1 {
      text-align: center;
      color: #ff6b35;
    }
    .controls {
      text-align: center;
      margin: 20px;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 8px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 4px;
      font-family: inherit;
    }
    button:hover {
      background: #ff8555;
    }
    #canvasContainer {
      text-align: center;
      margin-top: 20px;
    }
    .slider-container {
      margin: 15px 0;
      display: inline-block;
      width: 300px;
    }
    .slider-container label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }
    .preset-buttons {
      margin: 10px 0;
    }
    .preset-btn {
      padding: 8px 16px;
      font-size: 14px;
      margin: 3px;
      background: #444;
    }
    .preset-btn:hover {
      background: #666;
    }
    .preset-btn.active {
      background: #ff6b35;
    }
    .info {
      color: #aaa;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🖌️ Zorn Pentatonic - p5.brush Professional Oil Painting</h1>

  <div class="controls">
    <button onclick="loadNotesAndPaint()">🎨 Load Notes & Paint</button>
    <button id="playBtn" onclick="playWithAudio()" disabled>▶ Play with Audio</button>
    <button onclick="clearPainting()">🧹 Clear Canvas</button>

    <br><br>

    <div class="preset-buttons">
      <strong>Density Presets:</strong><br>
      <button class="preset-btn" onclick="setDensity('low')">Low (Fast)</button>
      <button class="preset-btn active" onclick="setDensity('medium')">Medium</button>
      <button class="preset-btn" onclick="setDensity('high')">High (Slow)</button>
      <button class="preset-btn" onclick="setDensity('ultra')">Ultra (Very Slow)</button>
    </div>

    <br>

    <div class="slider-container">
      <label>Strokes per Note: <span id="strokesValue">20</span></label>
      <input type="range" id="strokesSlider" min="1" max="150" value="20" oninput="updateSliders()">
    </div>

    <div class="slider-container">
      <label>Brush Weight: <span id="weightValue">3</span></label>
      <input type="range" id="weightSlider" min="1" max="10" value="3" step="0.5" oninput="updateSliders()">
    </div>

    <br>
    <div class="info">
      Total strokes: <span id="totalStrokes">740</span> |
      Progress: <span id="progress">0</span>/<span id="totalNotes">37</span> notes
      <br>Using p5.brush library by acamposuribe
    </div>
  </div>

  <div id="canvasContainer"></div>

  <!-- Audio element for synchronized playback -->
  <audio id="audioPlayer" preload="auto" style="display: none;">
    <source src="1207(1)_audio.wav" type="audio/wav">
    Your browser does not support the audio element.
  </audio>

  <script>
    // Global variables
    let notes = [];
    let painting = false;
    let paintingWithAudio = false;
    let currentNoteIndex = 0;
    let currentStrokeIndex = 0;
    let audioElement = null;
    let brushReady = false;  // Flag to check if brush is loaded

    // Density settings
    let strokesPerNote = 20;
    let brushWeight = 3;

    const DENSITY_PRESETS = {
      low: { strokes: 8, weight: 2 },
      medium: { strokes: 20, weight: 3 },
      high: { strokes: 60, weight: 4 },
      ultra: { strokes: 120, weight: 5 }
    };

    // Zorn Palette
    const ZORN_PALETTE = {
      YELLOW_OCHRE: [227, 168, 87],
      VERMILION: [217, 96, 59],
      IVORY_BLACK: [41, 36, 33],
      TITANIUM_WHITE: [252, 250, 242]
    };

    const CANVAS_BASE = [242, 235, 220];

    // p5.js sketch
    function setup() {
      const cnv = createCanvas(1200, 600, WEBGL);
      cnv.parent('canvasContainer');

      // Setup canvas background
      background(CANVAS_BASE);

      // Load p5.brush and set flag when ready
      brush.load();
      brushReady = true;

      console.log('✅ p5.brush canvas ready (WEBGL mode)');
      console.log('📚 Available brushes:', brush.box());
    }

    function draw() {
      // Only paint if brush is ready
      if (!brushReady) return;

      // Translate to top-left origin (WEBGL has center at 0,0)
      translate(-width/2, -height/2);

      // Audio-synchronized painting
      if (paintingWithAudio && audioElement && !audioElement.paused) {
        const currentTime = audioElement.currentTime;

        // Paint notes based on audio time
        for (let i = 0; i < notes.length; i++) {
          const note = notes[i];
          if (note.start_time <= currentTime && note.start_time + note.duration >= currentTime) {
            // Paint this note (fewer strokes for real-time)
            paintNoteStroke(note, i, frameCount % 3);
          }
        }

        // Update progress
        let notesPlayed = notes.filter(n => n.start_time <= currentTime).length;
        document.getElementById('progress').textContent = notesPlayed;

        // Check if audio finished
        if (audioElement.ended) {
          paintingWithAudio = false;
          console.log('✅ Audio playback complete!');
        }
      }
      // Auto-paint notes with multiple strokes per note (non-audio mode)
      else if (painting && currentNoteIndex < notes.length) {
        const note = notes[currentNoteIndex];

        // Paint multiple strokes for this note
        paintNoteStroke(note, currentNoteIndex, currentStrokeIndex);
        currentStrokeIndex++;

        // Move to next note when all strokes are done
        if (currentStrokeIndex >= strokesPerNote) {
          currentStrokeIndex = 0;
          currentNoteIndex++;

          // Update progress display
          document.getElementById('progress').textContent = currentNoteIndex;
        }

        if (currentNoteIndex >= notes.length) {
          painting = false;
          console.log('✅ Painting complete!');
          console.log(`Total strokes painted: ${notes.length * strokesPerNote}`);
        }
      }
    }

    //
    // Paint a single stroke for a note using p5.brush
    //
    function paintNoteStroke(note, noteIndex, strokeIndex) {
      // Map note position to canvas (translated to top-left origin)
      const totalDuration = notes[notes.length - 1].start_time + notes[notes.length - 1].duration;
      const baseX = 50 + (note.start_time / totalDuration) * (width - 100);
      const baseY = height / 2 + (60 - note.pitch) * 10;

      // Add variation to position for multiple strokes
      const variation = 40 + (note.velocity_value || 0.5) * 60;
      const x = baseX + random(-variation, variation);
      const y = baseY + random(-variation, variation);

      // Get color from pitch
      const colorArray = getPaletteColor(note.pitch);
      const col = color(colorArray[0], colorArray[1], colorArray[2]);

      // Size based on velocity
      let size = 50 + (note.velocity_value || 0.5) * 100;
      size *= random(0.7, 1.4);

      // Technique-based brush selection and rendering
      const technique = note.technique || 'regular';

      switch(technique) {
        case 'vibrato':
          drawVibratoWithBrush(x, y, size, col);
          break;
        case 'bend':
          drawBendWithBrush(x, y, size, col);
          break;
        case 'slide':
          drawSlideWithBrush(x, y, size, col);
          break;
        case 'staccato':
          drawStaccatoWithBrush(x, y, size, col);
          break;
        case 'legato':
          drawLegatoWithBrush(x, y, size, col);
          break;
        default:
          drawOilBrushStroke(x, y, size, col);
      }
    }

    //
    // Oil brush stroke using p5.brush (using '2B' soft pencil)
    //
    function drawOilBrushStroke(x, y, size, col) {
      // Set brush type, color, and weight in one call
      brush.set('2B', col, brushWeight);

      // Random directional stroke
      const angle = random(TWO_PI);
      const length = size * random(0.8, 1.5);

      const x2 = x + cos(angle) * length;
      const y2 = y + sin(angle) * length;

      brush.line(x, y, x2, y2);
    }

    //
    // Vibrato - wavy marker stroke
    //
    function drawVibratoWithBrush(x, y, size, col) {
      brush.set('marker', col, brushWeight * 0.8);

      const numPoints = 8;
      const amplitude = size * 0.3;
      const waveLength = size * 1.5;

      for (let i = 0; i < numPoints - 1; i++) {
        const t1 = i / (numPoints - 1);
        const t2 = (i + 1) / (numPoints - 1);

        const x1 = x - waveLength / 2 + t1 * waveLength;
        const y1 = y + sin(t1 * PI * 4) * amplitude;
        const x2 = x - waveLength / 2 + t2 * waveLength;
        const y2 = y + sin(t2 * PI * 4) * amplitude;

        brush.line(x1, y1, x2, y2);
      }
    }

    //
    // Bend - curved brush stroke
    //
    function drawBendWithBrush(x, y, size, col) {
      brush.set('2B', col, brushWeight * 1.2);

      const startY = y + size * 0.5;
      const endY = y - size * 0.5;
      const controlX = x + size * 0.6;

      // Draw curved stroke
      const numSegments = 10;
      for (let i = 0; i < numSegments; i++) {
        const t1 = i / numSegments;
        const t2 = (i + 1) / numSegments;

        // Quadratic bezier curve
        const x1 = lerp(x, controlX, t1);
        const y1 = lerp(startY, endY, t1);
        const x2 = lerp(x, controlX, t2);
        const y2 = lerp(startY, endY, t2);

        brush.line(x1, y1, x2, y2);
      }
    }

    //
    // Slide - diagonal spray brush stroke
    //
    function drawSlideWithBrush(x, y, size, col) {
      brush.set('spray', col, brushWeight * 1.5);

      const angle = random() > 0.5 ? -PI / 4 : PI / 4;
      const length = size * 1.5;

      const x2 = x + cos(angle) * length;
      const y2 = y + sin(angle) * length;

      brush.line(x, y, x2, y2);
    }

    //
    // Staccato - dotted marker strokes
    //
    function drawStaccatoWithBrush(x, y, size, col) {
      brush.set('marker', col, brushWeight * 1.5);
      brush.fill(col, 150);  // Fill with transparency

      const numDots = 3 + floor(random(3));

      for (let i = 0; i < numDots; i++) {
        const angle = (i / numDots) * TWO_PI;
        const distance = size * 0.4;
        const dotX = x + cos(angle) * distance;
        const dotY = y + sin(angle) * distance;

        brush.circle(dotX, dotY, size * 0.2);
      }

      // Center dot
      brush.circle(x, y, size * 0.25);
      brush.noFill();
    }

    //
    // Legato - soft charcoal-like blended stroke
    //
    function drawLegatoWithBrush(x, y, size, col) {
      brush.set('charcoal', col, brushWeight * 2);

      const angle = random(TWO_PI);
      const length = size * 1.8;

      const x2 = x + cos(angle) * length;
      const y2 = y + sin(angle) * length;

      brush.line(x, y, x2, y2);
    }

    //
    // Get palette color from pitch
    //
    function getPaletteColor(pitch) {
      const normalized = (pitch % 12) / 12;

      if (normalized < 0.25) return ZORN_PALETTE.YELLOW_OCHRE;
      else if (normalized < 0.5) return ZORN_PALETTE.VERMILION;
      else if (normalized < 0.75) return ZORN_PALETTE.IVORY_BLACK;
      else return ZORN_PALETTE.TITANIUM_WHITE;
    }

    //
    // Set density preset
    //
    function setDensity(preset) {
      const settings = DENSITY_PRESETS[preset];
      strokesPerNote = settings.strokes;
      brushWeight = settings.weight;

      // Update sliders
      document.getElementById('strokesSlider').value = strokesPerNote;
      document.getElementById('weightSlider').value = brushWeight;
      updateSliders();

      // Update button states
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      console.log(`🎨 Density set to ${preset}: ${strokesPerNote} strokes/note, weight ${brushWeight}`);
    }

    //
    // Update slider values
    //
    function updateSliders() {
      strokesPerNote = parseInt(document.getElementById('strokesSlider').value);
      brushWeight = parseFloat(document.getElementById('weightSlider').value);

      document.getElementById('strokesValue').textContent = strokesPerNote;
      document.getElementById('weightValue').textContent = brushWeight;

      // Update total strokes display
      const totalStrokes = notes.length * strokesPerNote || strokesPerNote * 37;
      document.getElementById('totalStrokes').textContent = totalStrokes;
    }

    //
    // Load notes and start painting
    //
    async function loadNotesAndPaint() {
      try {
        const response = await fetch('1207(1)_notes.json');
        notes = await response.json();
        console.log(`✅ Loaded ${notes.length} notes`);

        // Update UI
        document.getElementById('totalNotes').textContent = notes.length;
        document.getElementById('progress').textContent = 0;
        updateSliders();

        // Enable play button
        document.getElementById('playBtn').disabled = false;

        // Reset
        currentNoteIndex = 0;
        currentStrokeIndex = 0;
        background(CANVAS_BASE);

        // Start painting
        painting = true;
        console.log(`🎨 Starting p5.brush painting: ${strokesPerNote} strokes/note, weight ${brushWeight}`);
        console.log(`Total strokes: ${notes.length * strokesPerNote}`);
      } catch (error) {
        console.error('❌ Error loading notes:', error);
        alert('Errore nel caricamento note! Verifica che 1207(1)_notes.json esista.');
      }
    }

    //
    // Play with audio synchronization
    //
    async function playWithAudio() {
      if (notes.length === 0) {
        alert('Carica prima le note con "Load Notes & Paint"!');
        return;
      }

      // Stop regular painting mode
      painting = false;

      // Reset canvas
      background(CANVAS_BASE);

      // Get audio element
      audioElement = document.getElementById('audioPlayer');

      try {
        // Reset audio and start from beginning
        audioElement.currentTime = 0;
        await audioElement.play();

        // Enable audio-synchronized painting
        paintingWithAudio = true;

        console.log('🎵 Playing with audio synchronization');
        document.getElementById('playBtn').disabled = true;

        // Re-enable button when audio ends
        audioElement.onended = () => {
          document.getElementById('playBtn').disabled = false;
          console.log('✅ Playback finished');
        };

      } catch (error) {
        console.error('❌ Error playing audio:', error);
        alert('Errore nel playback audio! Verifica che 1207(1)_audio.wav esista.');
        paintingWithAudio = false;
      }
    }

    //
    // Clear painting
    //
    function clearPainting() {
      background(CANVAS_BASE);
      painting = false;
      paintingWithAudio = false;
      currentNoteIndex = 0;
      currentStrokeIndex = 0;
      document.getElementById('progress').textContent = 0;

      // Stop audio if playing
      if (audioElement && !audioElement.paused) {
        audioElement.pause();
        audioElement.currentTime = 0;
        document.getElementById('playBtn').disabled = false;
      }

      console.log('🧹 Canvas cleared');
    }

    // Initialize on load
    window.addEventListener('load', () => {
      updateSliders();
    });
  </script>
</body>
</html>
