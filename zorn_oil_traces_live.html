<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zorn Oil Painting - Intelligent Traces</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@0.12.1"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Monaco', 'Courier New', monospace;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    h1 {
      text-align: center;
      color: #ff6b35;
      font-size: 24px;
    }
    .controls {
      text-align: center;
      margin: 20px auto;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 8px;
      max-width: 900px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #ff8555;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    #canvasContainer {
      text-align: center;
      margin-top: 20px;
    }
    .info {
      color: #aaa;
      font-size: 13px;
      margin-top: 15px;
      line-height: 1.8;
    }
    .info strong {
      color: #ff6b35;
    }
  </style>
</head>
<body>
  <h1>🎨 Zorn Pentatonic - Oil Painting con Tracce Intelligenti + Audio Live</h1>

  <div class="controls">
    <button id="startBtn" onclick="startPainting()">▶ Start Painting with Audio</button>
    <button onclick="pausePainting()">⏸ Pause</button>
    <button onclick="clearCanvas()">🧹 Clear & Restart</button>

    <div class="info">
      <strong>Tracce:</strong> <span id="traces">0</span> |
      <strong>Brush:</strong> <span id="brush">--</span>px |
      <strong>Bad pixels:</strong> <span id="bad">--</span><br>
      <small>Algoritmo: Javier Gracia Carpio | Source: zorn_pentatonic_pure_musical.png</small>
    </div>
  </div>

  <div id="canvasContainer"></div>

  <audio id="audio" preload="auto" style="display:none">
    <source src="1207(1)_audio.wav" type="audio/wav">
  </audio>

  <script>
    // Parameters
    const MAX_COLOR_DIFF = [30, 30, 30];  // Ridotto per seguire meglio i simboli
    const SMALLER_BRUSH = 2;  // Ridotto da 4 a 2
    const BRUSH_DECREMENT = 1.3;
    const MAX_INVALID_TRAJ = 5000;
    const MAX_INVALID_TRAJ_SMALL = 10000;
    const MAX_INVALID_TRACES = 250;
    const MAX_INVALID_TRACES_SMALL = 350;
    const TRACE_SPEED = 1.5;  // Ridotto da 2 a 1.5 per tracce più corte
    const REL_TRACE_LENGTH = 1.8;  // Ridotto da 2.3 a 1.8
    const MIN_TRACE_LENGTH = 12;  // Ridotto da 16 a 12

    let img, imgW, imgH;
    let bgColor;
    let similarColorPx = [];
    let visitedPx = [];
    let badPaintedPx = [];
    let nBadPx = 0;
    let avgBrushSize;
    let trace;
    let nTraces = 0;
    let isPainting = false;
    let audio;
    let frameCounter = 0;
    let brushReady = false;

    function preload() {
      img = loadImage('zorn_pentatonic_pure_musical.png');
    }

    function setup() {
      if (img.width > 1200) img.resize(1200, 0);

      imgW = img.width;
      imgH = img.height;

      createCanvas(imgW, imgH).parent('canvasContainer');
      pixelDensity(1);  // Migliora performance per readback operations

      // Inizializza p5.brush per effetti pittorici realistici
      // Nota: p5.brush si auto-inizializza dopo createCanvas

      // Aspetta un frame per far inizializzare p5.brush
      setTimeout(() => {
        if (typeof brush !== 'undefined') {
          // Configura bleed e texture per effetto oil painting
          brush.bleed(0.3, "out");  // Sanguinamento verso esterno
          brush.fillTexture(0.6, 0.8);  // Texture pittorica
          brush.field("seabed");  // Flow field organico
          brushReady = true;
          console.log('✓ p5.brush ready');
        } else {
          console.warn('⚠️ p5.brush not available, using fallback');
        }
      }, 100);

      img.loadPixels();

      bgColor = color(255);
      strokeCap(SQUARE);
      background(bgColor);

      const nPx = imgW * imgH;
      nBadPx = 0;

      for (let i = 0; i < nPx; i++) {
        similarColorPx[i] = false;
        visitedPx[i] = false;

        // Solo pixel NON BIANCHI (simboli) sono da dipingere
        const iPx = 4 * i;
        const r = img.pixels[iPx], g = img.pixels[iPx + 1], b = img.pixels[iPx + 2];
        const brightness = (r + g + b) / 3;

        if (brightness < 250) {  // Pixel colorato (non bianco) = simbolo da dipingere
          badPaintedPx[nBadPx++] = i;
        }
      }

      console.log('🎨 Pixel con simboli da dipingere:', nBadPx, 'su', nPx);

      avgBrushSize = max(SMALLER_BRUSH, max(imgW, imgH) / 20);  // Ridotto per pennellate più piccole

      updateUI();
      noLoop();

      console.log('Canvas ready:', imgW, 'x', imgH, '| Brush:', avgBrushSize);
    }

    function draw() {
      // Ferma se l'audio è finito
      if (audio && audio.ended) {
        isPainting = false;
        noLoop();
        console.log('🎵 Audio terminato - pittura fermata. Traces:', nTraces);
        document.getElementById('startBtn').disabled = false;
        return;
      }

      if (!isPainting) return;

      if (!trace) {
        trace = getValidTrace();
        if (!trace) {
          isPainting = false;
          noLoop();
          console.log('✅ Painting complete! Traces:', nTraces);
          return;
        }
      }

      trace.paint(visitedPx, imgW, imgH);
      trace = undefined;

      // Aggiorna pixel arrays solo ogni 5 frames per performance
      frameCounter++;
      if (frameCounter % 5 === 0) {
        updatePixelArrays();
      }
      updateUI();
    }

    function getValidTrace() {
      let invalidTraj = 0, invalidTraces = 0;

      while (true) {
        if (avgBrushSize === SMALLER_BRUSH &&
            (invalidTraj > MAX_INVALID_TRAJ_SMALL || invalidTraces > MAX_INVALID_TRACES_SMALL)) {
          return undefined;
        }

        if (avgBrushSize > SMALLER_BRUSH &&
            (invalidTraj > MAX_INVALID_TRAJ || invalidTraces > MAX_INVALID_TRACES)) {
          avgBrushSize = max(SMALLER_BRUSH, min(avgBrushSize / BRUSH_DECREMENT, avgBrushSize - 2));
          console.log('Riducendo brush a:', round(avgBrushSize));
          invalidTraj = 0;
          invalidTraces = 0;

          for (let i = 0; i < imgW * imgH; i++) visitedPx[i] = false;
        }

        let validTraj = false;
        const bSize = max(SMALLER_BRUSH, avgBrushSize * random(0.95, 1.05));
        const nSteps = round(max(MIN_TRACE_LENGTH, REL_TRACE_LENGTH * bSize * random(0.9, 1.1)) / TRACE_SPEED);
        let t;

        while (!validTraj && invalidTraj % 500 !== 499) {
          const px = badPaintedPx[floor(random(nBadPx))];
          const startPos = createVector(px % imgW, floor(px / imgW));
          t = new Trace(startPos, nSteps, TRACE_SPEED, img);  // Passo img
          validTraj = t.hasValidTrajectory(similarColorPx, visitedPx, img);
          invalidTraj++;
        }

        if (validTraj) {
          invalidTraj = 0;
          t.setBrushSize(bSize);

          if (t.calculateColors(MAX_COLOR_DIFF, similarColorPx, img, bgColor)) {
            nTraces++;
            return t;
          } else {
            invalidTraces++;
          }
        } else {
          invalidTraj++;
          invalidTraces++;
        }
      }
    }

    function updatePixelArrays() {
      loadPixels();
      nBadPx = 0;
      const rBg = red(bgColor), gBg = green(bgColor), bBg = blue(bgColor);

      for (let x = 0; x < imgW; x++) {
        for (let y = 0; y < imgH; y++) {
          const px = x + y * imgW;
          const iPx = 4 * px;
          const cPx = 4 * (x + y * width);

          // Controlla se il pixel ORIGINALE è un simbolo (non bianco)
          const rImg = img.pixels[iPx], gImg = img.pixels[iPx + 1], bImg = img.pixels[iPx + 2];
          const brightnessImg = (rImg + gImg + bImg) / 3;
          const isSymbol = brightnessImg < 250;

          const rP = pixels[cPx], gP = pixels[cPx + 1], bP = pixels[cPx + 2];
          let well = false;

          if (rP !== rBg || gP !== gBg || bP !== bBg) {
            well = abs(img.pixels[iPx] - rP) < MAX_COLOR_DIFF[0] &&
                   abs(img.pixels[iPx + 1] - gP) < MAX_COLOR_DIFF[1] &&
                   abs(img.pixels[iPx + 2] - bP) < MAX_COLOR_DIFF[2];
          }

          similarColorPx[px] = well;

          // Aggiungi come "bad" SOLO se è un simbolo E mal dipinto
          if (isSymbol && !well) {
            badPaintedPx[nBadPx++] = px;
          }
        }
      }
      updatePixels();
    }

    async function startPainting() {
      if (isPainting) return;

      isPainting = true;
      loop();

      audio = document.getElementById('audio');
      try {
        audio.currentTime = 0;
        await audio.play();
        console.log('🎵 Audio playing');

        // Ferma la pittura quando l'audio finisce
        audio.onended = () => {
          isPainting = false;
          noLoop();
          console.log('🎵 Audio terminato');
          document.getElementById('startBtn').disabled = false;
        };
      } catch(e) {
        console.warn('⚠️ Audio failed:', e);
      }

      document.getElementById('startBtn').disabled = true;
    }

    function pausePainting() {
      isPainting = false;
      noLoop();
      if (audio && !audio.paused) audio.pause();
      document.getElementById('startBtn').disabled = false;
    }

    function clearCanvas() {
      background(bgColor);
      isPainting = false;
      noLoop();

      const nPx = imgW * imgH;
      nBadPx = 0;

      for (let i = 0; i < nPx; i++) {
        similarColorPx[i] = false;
        visitedPx[i] = false;

        // Solo pixel NON BIANCHI (simboli) sono da dipingere
        const iPx = 4 * i;
        const r = img.pixels[iPx], g = img.pixels[iPx + 1], b = img.pixels[iPx + 2];
        const brightness = (r + g + b) / 3;

        if (brightness < 250) {  // Pixel colorato (non bianco) = simbolo da dipingere
          badPaintedPx[nBadPx++] = i;
        }
      }

      avgBrushSize = max(SMALLER_BRUSH, max(imgW, imgH) / 20);  // Ridotto per pennellate più piccole
      trace = undefined;
      nTraces = 0;
      frameCounter = 0;

      if (audio && !audio.paused) {
        audio.pause();
        audio.currentTime = 0;
      }

      document.getElementById('startBtn').disabled = false;
      updateUI();
    }

    function updateUI() {
      document.getElementById('traces').textContent = nTraces;
      document.getElementById('brush').textContent = round(avgBrushSize);
      document.getElementById('bad').textContent = nBadPx;
    }

    // TRACE CLASS
    class Trace {
      constructor(pos, nSteps, speed, img) {  // Aggiungo img come parametro
        this.noiseFactor = 0.007;
        this.maxSimColorFracTraj = 0.6;
        this.maxVisitsFracTraj = 0.35;
        this.minInsideFracTraj = 0.4;
        this.maxColorStDevTraj = 45;
        this.colorChange = 12;
        this.minAlpha = 20;

        this.nSteps = nSteps;
        this.positions = [];
        this.colors = [];
        this.alphas = [];
        this.brush = undefined;
        this.nBristles = 0;

        let p = pos.copy();
        this.positions[0] = p;

        // Direzione iniziale basata sul gradiente del punto di partenza
        let currentAngle = random(TWO_PI);
        const momentum = 0.85;  // Smooth direction changes
        const angleChangeMax = 0.15;  // Limita cambi di direzione bruschi

        // Genera traccia seguendo i gradienti con smoothing
        for (let s = 1; s < nSteps; s++) {
          const x = round(p.x), y = round(p.y);
          let targetAngle = currentAngle;

          // Calcola gradiente dell'immagine per seguire la forma
          if (x > 1 && x < img.width - 2 && y > 1 && y < img.height - 2) {
            // Calcola brightness dei pixel vicini (3x3 per più stabilità)
            const getBrightness = (px, py) => {
              if (px < 0 || px >= img.width || py < 0 || py >= img.height) return 255;
              const idx = 4 * (px + py * img.width);
              return (img.pixels[idx] + img.pixels[idx + 1] + img.pixels[idx + 2]) / 3;
            };

            // Sobel-like gradient (più robusto)
            const gradX =
              (-1 * getBrightness(x-1, y-1) + 1 * getBrightness(x+1, y-1)) +
              (-2 * getBrightness(x-1, y) + 2 * getBrightness(x+1, y)) +
              (-1 * getBrightness(x-1, y+1) + 1 * getBrightness(x+1, y+1));

            const gradY =
              (-1 * getBrightness(x-1, y-1) - 2 * getBrightness(x, y-1) - 1 * getBrightness(x+1, y-1)) +
              (1 * getBrightness(x-1, y+1) + 2 * getBrightness(x, y+1) + 1 * getBrightness(x+1, y+1));

            const gradMagnitude = sqrt(gradX * gradX + gradY * gradY);

            // Solo se il gradiente è significativo, usalo per guidare la direzione
            if (gradMagnitude > 5) {  // Soglia per ignorare gradienti deboli
              const gradAngle = atan2(gradY, gradX);
              targetAngle = gradAngle + HALF_PI;  // Tangente alla forma
            }
          }

          // Smooth angle change con momentum
          let angleDiff = targetAngle - currentAngle;

          // Normalizza la differenza tra -PI e PI
          while (angleDiff > PI) angleDiff -= TWO_PI;
          while (angleDiff < -PI) angleDiff += TWO_PI;

          // Limita il cambio di direzione
          angleDiff = constrain(angleDiff, -angleChangeMax, angleChangeMax);

          // Applica momentum per smooth transition
          currentAngle = currentAngle + angleDiff * (1 - momentum);

          p = createVector(p.x + speed * cos(currentAngle), p.y + speed * sin(currentAngle));
          this.positions[s] = p;
        }
      }

      hasValidTrajectory(simCol, visited, img) {
        let inside = 0, simColCounter = 0, visitCnt = 0;
        let rSum = 0, rSqSum = 0, gSum = 0, gSqSum = 0, bSum = 0, bSqSum = 0;

        for (let s = 0; s < this.nSteps; s++) {
          const p = this.positions[s];
          const x = round(p.x), y = round(p.y);

          if (x >= 0 && x < img.width && y >= 0 && y < img.height) {
            inside++;
            const px = x + y * img.width;
            if (simCol[px]) simColCounter++;
            if (visited[px]) visitCnt++;

            const iPx = 4 * px;
            const r = img.pixels[iPx], g = img.pixels[iPx + 1], b = img.pixels[iPx + 2];
            rSum += r; rSqSum += r * r;
            gSum += g; gSqSum += g * g;
            bSum += b; bSqSum += b * b;
          }
        }

        let rStDev = 0, gStDev = 0, bStDev = 0;
        if (inside > 1) {
          rStDev = sqrt((rSqSum - rSum * rSum / inside) / (inside - 1));
          gStDev = sqrt((gSqSum - gSum * gSum / inside) / (inside - 1));
          bStDev = sqrt((bSqSum - bSum * bSum / inside) / (inside - 1));
        }

        return inside >= this.minInsideFracTraj * this.nSteps &&
               simColCounter <= this.maxSimColorFracTraj * inside &&
               visitCnt <= this.maxVisitsFracTraj * inside &&
               rStDev < this.maxColorStDevTraj &&
               gStDev < this.maxColorStDevTraj &&
               bStDev < this.maxColorStDevTraj;
      }

      setBrushSize(bSize) {
        this.brush = new Brush(bSize);
        this.brush.init(this.positions[0]);
        this.nBristles = this.brush.getNBristles();
      }

      calculateColors(maxDiff, simCol, img, bg) {
        const alphaDec = min(255 / this.nSteps, 25);
        let alpha = 255 + alphaDec;

        for (let s = 0; s < this.nSteps; s++) {
          alpha -= alphaDec;
          this.alphas[s] = constrain(round(alpha), 2, 255);
          for (let b = 0; b < this.nBristles; b++) {
            this.colors[3 * (b + s * this.nBristles)] = -1;
          }
        }

        let rAvg = 0, gAvg = 0, bAvg = 0, cnt = 0;

        for (let s = 0; s < this.nSteps; s++) {
          const p = this.positions[s];
          const x = round(p.x), y = round(p.y);

          if (x >= 0 && x < img.width && y >= 0 && y < img.height) {
            const px = 4 * (x + y * img.width);
            rAvg += img.pixels[px];
            gAvg += img.pixels[px + 1];
            bAvg += img.pixels[px + 2];
            cnt++;
          }
        }

        if (cnt > 0) {
          rAvg /= cnt;
          gAvg /= cnt;
          bAvg /= cnt;
        }

        const nSeed = random(1000);
        for (let b = 0; b < this.nBristles; b++) {
          const loc = 3 * b;
          const delta = this.colorChange * (noise(nSeed + 0.4 * b) - 0.5);
          this.colors[loc] = constrain(rAvg + delta, 0, 255);
          this.colors[loc + 1] = constrain(gAvg + delta, 0, 255);
          this.colors[loc + 2] = constrain(bAvg + delta, 0, 255);
        }

        for (let s = 1; s < this.nSteps; s++) {
          for (let b = 0; b < this.nBristles; b++) {
            const loc = 3 * (b + s * this.nBristles);
            const loc0 = 3 * b;
            this.colors[loc] = this.colors[loc0];
            this.colors[loc + 1] = this.colors[loc0 + 1];
            this.colors[loc + 2] = this.colors[loc0 + 2];
          }
        }

        return true;
      }

      paint(visited, w, h) {
        const bCols = [];

        for (let s = 0; s < this.nSteps; s++) {
          const a = this.alphas[s];

          for (let b = 0; b < this.nBristles; b++) {
            const loc = 3 * (b + s * this.nBristles);
            bCols[b] = color(this.colors[loc], this.colors[loc + 1], this.colors[loc + 2], a);
          }

          this.brush.update(this.positions[s], true);
          this.brush.paintOnScreen(bCols);

          if (a > this.minAlpha) {
            const bPos = this.brush.getBristlesPositions();
            if (bPos) {
              for (let b = 0; b < this.nBristles; b++) {
                const p = bPos[b];
                const x = round(p.x), y = round(p.y);
                if (x >= 0 && x < w && y >= 0 && y < h) {
                  visited[x + y * w] = true;
                }
              }
            }
          }
        }

        this.brush.init(this.positions[0]);
      }
    }

    // BRISTLE CLASS
    class Bristle {
      constructor(nElem, thickness) {
        this.nPos = nElem + 1;
        this.pos = [];
        this.len = [];
        this.thick = [];

        const tDec = thickness / nElem;
        for (let i = 0; i < this.nPos; i++) {
          this.pos[i] = createVector(0, 0);
          this.len[i] = this.nPos - i;
          this.thick[i] = thickness - (i - 1) * tDec;
        }
      }

      setPosition(newPos) {
        for (let i = 0; i < this.nPos; i++) {
          this.pos[i].set(newPos);
        }
      }

      updatePosition(newPos) {
        this.pos[0].set(newPos);

        for (let i = 1; i < this.nPos; i++) {
          const prev = this.pos[i - 1];
          const curr = this.pos[i];
          const ang = atan2(prev.y - curr.y, prev.x - curr.x);
          curr.x = prev.x - this.len[i] * cos(ang);
          curr.y = prev.y - this.len[i] * sin(ang);
        }
      }

      paintOnScreen(col) {
        stroke(col);
        let prev = this.pos[0];

        for (let i = 1; i < this.nPos; i++) {
          const curr = this.pos[i];
          strokeWeight(this.thick[i]);
          line(prev.x, prev.y, curr.x, curr.y);
          prev = curr;
        }
      }
    }

    // BRUSH CLASS
    class Brush {
      constructor(size) {
        this.maxBristleLen = 15;
        this.maxBristleThick = 5;
        this.posForAvg = 4;
        this.bristleVertNoise = 8;
        this.maxBristleHorNoise = 4;
        this.noiseSpeedFac = 0.04;

        this.position = createVector(0, 0);
        this.nBristles = round(size * random(1.6, 1.9));
        this.bristles = [];
        this.bOffsets = [];
        this.bPositions = [];
        this.posHistory = [];
        this.avgPosition = this.position.copy();
        this.noiseSeed = random(1000);
        this.updatesCnt = 0;
        this.bristleHorNoise = min(0.3 * size, this.maxBristleHorNoise);

        const bLen = min(size, this.maxBristleLen);
        const nElem = round(sqrt(2 * bLen));
        const bThick = min(0.8 * bLen, this.maxBristleThick);

        for (let b = 0; b < this.nBristles; b++) {
          this.bristles[b] = new Bristle(nElem, bThick);
          this.bOffsets[b] = createVector(size * random(-0.5, 0.5), this.bristleVertNoise * random(-0.5, 0.5));
          this.bPositions[b] = createVector(0, 0);
        }
      }

      init(newPos) {
        this.position.set(newPos);
        this.posHistory = [];
        this.avgPosition.set(this.position);
        this.updatesCnt = 0;
      }

      update(newPos, updateElems) {
        this.position.set(newPos);

        const hSize = this.posHistory.length;
        if (hSize < this.posForAvg) {
          this.posHistory[hSize] = newPos.copy();
        } else {
          this.posHistory[this.updatesCnt % this.posForAvg].set(newPos);
        }

        let xAvg = 0, yAvg = 0;
        const currSize = min(hSize + 1, this.posForAvg);
        for (let i = 0; i < currSize; i++) {
          xAvg += this.posHistory[i].x;
          yAvg += this.posHistory[i].y;
        }
        xAvg /= currSize;
        yAvg /= currSize;

        const dirAng = HALF_PI + atan2(yAvg - this.avgPosition.y, xAvg - this.avgPosition.x);
        this.avgPosition.set(xAvg, yAvg);

        this.updateBristlePositions(dirAng);

        if (updateElems) {
          if (currSize === this.posForAvg) {
            for (let b = 0; b < this.nBristles; b++) {
              this.bristles[b].updatePosition(this.bPositions[b]);
            }
          } else if (currSize === this.posForAvg - 1) {
            for (let b = 0; b < this.nBristles; b++) {
              this.bristles[b].setPosition(this.bPositions[b]);
            }
          }
        }

        this.updatesCnt++;
      }

      updateBristlePositions(dirAng) {
        if (this.posHistory.length >= this.posForAvg - 1) {
          const c = cos(dirAng), s = sin(dirAng);
          const nPos = this.noiseSeed + this.noiseSpeedFac * this.updatesCnt;

          for (let b = 0; b < this.nBristles; b++) {
            const off = this.bOffsets[b];
            const x = off.x + this.bristleHorNoise * (noise(nPos + 0.1 * b) - 0.5);
            const y = off.y;

            const p = this.bPositions[b];
            p.x = this.position.x + (x * c - y * s);
            p.y = this.position.y + (x * s + y * c);
          }
        }
      }

      paintOnScreen(cols) {
        if (this.posHistory.length === this.posForAvg) {
          // Usa p5.brush con bleed e texture invece del sistema bristle custom
          if (brushReady && cols && cols.length > 0) {
            // Calcola colore medio per questa posizione
            let rAvg = 0, gAvg = 0, bAvg = 0, aAvg = 0;
            for (let b = 0; b < this.nBristles; b++) {
              rAvg += red(cols[b]);
              gAvg += green(cols[b]);
              bAvg += blue(cols[b]);
              aAvg += alpha(cols[b]);
            }
            rAvg /= this.nBristles;
            gAvg /= this.nBristles;
            bAvg /= this.nBristles;
            aAvg /= this.nBristles;

            // Disegna con p5.brush per bleed e texture
            const col = color(rAvg, gAvg, bAvg, aAvg);
            const weight = this.nBristles * 0.5;  // Peso basato sul numero di bristles

            brush.set("marker2", col, weight);

            // Disegna pennellata seguendo le posizioni
            if (this.posHistory.length >= 2) {
              const p1 = this.posHistory[this.posHistory.length - 2];
              const p2 = this.posHistory[this.posHistory.length - 1];
              brush.line(p1.x, p1.y, p2.x, p2.y);
            }
          } else {
            // Fallback al sistema bristle originale se p5.brush non è pronto
            for (let b = 0; b < this.nBristles; b++) {
              this.bristles[b].paintOnScreen(cols[b]);
            }
          }
        }
      }

      getNBristles() {
        return this.nBristles;
      }

      getBristlesPositions() {
        if (this.posHistory.length === this.posForAvg) {
          return this.bPositions;
        }
      }
    }
  </script>
