<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zorn Notes → Painterly Brushstrokes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@0.12.1"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Monaco', 'Courier New', monospace;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    h1 {
      text-align: center;
      color: #ff6b35;
      font-size: 24px;
    }
    .controls {
      text-align: center;
      margin: 20px auto;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 8px;
      max-width: 900px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #ff8555;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    #canvasContainer {
      text-align: center;
      margin-top: 20px;
    }
    .info {
      color: #aaa;
      font-size: 13px;
      margin-top: 15px;
      line-height: 1.8;
    }
    .info strong {
      color: #ff6b35;
    }
  </style>
</head>
<body>
  <h1>🎨 Zorn Pentatonic - Note Musicali → Pennellate Pittoriche</h1>

  <div class="controls">
    <button id="startBtn" onclick="startPainting()">▶ Start Painting with Audio</button>
    <button onclick="pausePainting()">⏸ Pause</button>
    <button onclick="clearCanvas()">🧹 Clear & Restart</button>

    <div class="info">
      <strong>Note dipinte:</strong> <span id="noteCount">0</span> / <span id="totalNotes">--</span> |
      <strong>Tempo:</strong> <span id="currentTime">0.0</span>s<br>
      <small>Traslitterazione: Note musicali → Pennellate espressive (Zorn palette)</small>
    </div>
  </div>

  <div id="canvasContainer"></div>

  <audio id="audio" preload="auto" style="display:none">
    <source src="1207(1)_audio.wav" type="audio/wav">
  </audio>

  <script>
    // Zorn Palette
    const ZORN_COLORS = {
      yellow: [227, 168, 87],   // Yellow Ochre
      red: [193, 39, 45],        // Vermilion
      black: [41, 36, 33],       // Ivory Black
      white: [250, 247, 241]     // Titanium White
    };

    let notesData = [];
    let noteGroups = [];
    let currentGroupIndex = 0;
    let audio;
    let isPainting = false;
    let paintedNotes = 0;
    let brushReady = false;
    let canvasWidth = 1400;
    let canvasHeight = 800;

    // Pitch range per mappare le note sulla tela
    let minPitch = 999, maxPitch = 0;

    function preload() {
      notesData = loadJSON('1207(1)_notes.json');
    }

    function setup() {
      createCanvas(canvasWidth, canvasHeight).parent('canvasContainer');
      pixelDensity(1);

      // Inizializza p5.brush
      setTimeout(() => {
        if (typeof brush !== 'undefined') {
          brush.bleed(0.4, "out");
          brush.fillTexture(0.7, 0.9);
          brush.field("seabed");
          brushReady = true;
          console.log('✓ p5.brush ready');
        }
      }, 100);

      seedCanvas();  // Pre-dipingi il canvas
      strokeCap(ROUND);

      // Converti l'oggetto in array se necessario
      if (notesData && !Array.isArray(notesData)) {
        notesData = Object.values(notesData);
        console.log('🔄 Convertito oggetto in array');
      }

      if (!notesData || notesData.length === 0) {
        console.error('❌ Errore caricamento notes');
        return;
      }

      // Trova range di pitch per mappatura
      for (let i = 0; i < notesData.length; i++) {
        const note = notesData[i];
        if (note.pitch < minPitch) minPitch = note.pitch;
        if (note.pitch > maxPitch) maxPitch = note.pitch;
      }

      document.getElementById('totalNotes').textContent = notesData.length;

      // Raggruppa note in sound masses
      noteGroups = groupNotes(notesData);

      console.log('🎵 Note caricate:', notesData.length);
      console.log('📊 Pitch range:', minPitch, '-', maxPitch);
      console.log('🎭 Sound masses:', noteGroups.length);

      noLoop();
    }

    // PRE-PAINTING: sporca il canvas prima di iniziare
    function seedCanvas() {
      background(248);

      for (let i = 0; i < 12; i++) {
        const col = randomZorn();
        brush.set(
          "charcoal",
          color(col[0], col[1], col[2], random(20, 45)),
          random(30, 80)
        );

        brush.line(
          random(width),
          random(height),
          random(width),
          random(height)
        );
      }
    }

    // Raggruppa note vicine temporalmente (sound mass)
    function groupNotes(notes, window = 0.4) {
      let groups = [];
      let current = [];

      notes.forEach(n => {
        if (!current.length ||
            n.start_time - current[current.length - 1].start_time < window) {
          current.push(n);
        } else {
          groups.push(current);
          current = [n];
        }
      });

      if (current.length) groups.push(current);
      return groups;
    }

    // Helper: colore Zorn casuale
    function randomZorn() {
      const keys = Object.keys(ZORN_COLORS);
      return ZORN_COLORS[keys[floor(random(keys.length))]];
    }

    function draw() {
      if (!isPainting || !audio) return;

      const currentTime = audio.currentTime;
      document.getElementById('currentTime').textContent = currentTime.toFixed(1);

      // Disegna sound masses invece di note singole
      while (currentGroupIndex < noteGroups.length) {
        const group = noteGroups[currentGroupIndex];
        const groupStart = group[0].start_time;

        if (groupStart <= currentTime) {
          renderMass(group);
          currentGroupIndex++;
          paintedNotes += group.length;
          document.getElementById('noteCount').textContent = paintedNotes;
        } else {
          break;
        }
      }

      // Ferma quando audio finito
      if (audio.ended || currentGroupIndex >= noteGroups.length) {
        isPainting = false;
        noLoop();
        console.log('🎨 Painting complete!');
        document.getElementById('startBtn').disabled = false;
      }
    }

    // RENDER MASS: dipinge gruppo di note che si insistono
    function renderMass(mass) {
      // Zona sonora (non timeline!)
      const avgPitch = mass.reduce((s, n) => s + n.pitch, 0) / mass.length;
      const x = map(avgPitch, minPitch, maxPitch, width * 0.2, width * 0.8);
      const y = random(height * 0.3, height * 0.7);

      mass.forEach(note => {
        // Duration = passes (consumo pigmento)
        const passes = int(map(note.duration, 0, 3, 1, 8));
        const baseCol = getPitchColor(note.pitch, note.velocity_value);

        for (let i = 0; i < passes; i++) {
          let life = 1 - i / passes;  // Esaurimento
          let jitter = random(-20, 20) * (1 + note.tension);

          let alpha = map(note.velocity_value, 0.3, 0.8, 40, 140) * life;
          let weight = map(note.velocity_value, 0.3, 0.8, 10, 45) * life;

          brush.set(
            "charcoal",
            color(baseCol[0], baseCol[1], baseCol[2], alpha),
            weight
          );

          // Technique cambia il GESTO
          if (note.technique === "vibrato") {
            let wobble = sin(frameCount * 0.1 + i) * 12;
            brush.line(
              x + wobble + jitter,
              y + jitter,
              x + wobble + random(-40, 40),
              y + random(-40, 40)
            );
          } else if (note.technique === "bend") {
            brush.line(
              x,
              y,
              x + random(-30, 30),
              y - note.tension * 80
            );
          } else {
            brush.line(
              x + jitter,
              y + jitter,
              x + random(-50, 50),
              y + random(-50, 50)
            );
          }
        }
      });
    }

    function getPitchColor(pitch, velocity) {
      // Mappa pitch a Zorn palette con transizioni
      const normalizedPitch = map(pitch, minPitch, maxPitch, 0, 1);

      let col;
      if (normalizedPitch < 0.25) {
        // Basse: Black → Red
        col = lerpColorArray(ZORN_COLORS.black, ZORN_COLORS.red, normalizedPitch * 4);
      } else if (normalizedPitch < 0.5) {
        // Medio-basse: Red → Yellow
        col = lerpColorArray(ZORN_COLORS.red, ZORN_COLORS.yellow, (normalizedPitch - 0.25) * 4);
      } else if (normalizedPitch < 0.75) {
        // Medio-alte: Yellow → mix with white
        col = lerpColorArray(ZORN_COLORS.yellow, ZORN_COLORS.white, (normalizedPitch - 0.5) * 4);
      } else {
        // Alte: più white
        col = lerpColorArray(ZORN_COLORS.yellow, ZORN_COLORS.white, (normalizedPitch - 0.75) * 4);
      }

      // Modulazione con velocity (dinamica forte = colore più saturo)
      const saturation = map(velocity, 0.3, 0.7, 0.7, 1.0);
      col = col.map(c => c * saturation);

      return col;
    }

    function lerpColorArray(col1, col2, amt) {
      return [
        lerp(col1[0], col2[0], amt),
        lerp(col1[1], col2[1], amt),
        lerp(col1[2], col2[2], amt)
      ];
    }

    async function startPainting() {
      if (isPainting) return;

      currentGroupIndex = 0;
      paintedNotes = 0;
      isPainting = true;

      audio = document.getElementById('audio');
      try {
        audio.currentTime = 0;
        await audio.play();
        console.log('🎵 Audio playing');

        loop();  // Avvia draw loop

        audio.onended = () => {
          isPainting = false;
          noLoop();
          console.log('🎵 Audio terminato');
          document.getElementById('startBtn').disabled = false;
        };
      } catch(e) {
        console.warn('⚠️ Audio failed:', e);
      }

      document.getElementById('startBtn').disabled = true;
    }

    function pausePainting() {
      isPainting = false;
      noLoop();
      if (audio && !audio.paused) audio.pause();
      document.getElementById('startBtn').disabled = false;
    }

    function clearCanvas() {
      seedCanvas();
      currentGroupIndex = 0;
      paintedNotes = 0;
      isPainting = false;
      noLoop();

      if (audio && !audio.paused) {
        audio.pause();
        audio.currentTime = 0;
      }

      document.getElementById('noteCount').textContent = 0;
      document.getElementById('currentTime').textContent = '0.0';
      document.getElementById('startBtn').disabled = false;
    }
  </script>
</body>
</html>
